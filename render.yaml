services:
  - type: web
    name: web3-fanbase
    runtime: node
    plan: free               # Free instance: no persistent disk, so the DB lives in Neon (external Postgres).
    region: oregon
    branch: master
    # postinstall runs `prisma generate`; db push applies the schema to Neon once
    # per deploy (idempotent), then Next builds.
    buildCommand: npm install && npx prisma db push --skip-generate && npm run build
    startCommand: npx next start -p $PORT
    healthCheckPath: /login
    envVars:
      - key: DATABASE_URL
        sync: false          # Paste your Neon pooled connection string in the Render dashboard.
      - key: JWT_SECRET
        generateValue: true  # Render generates a strong value on first deploy.
      - key: CRON_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: "20"
